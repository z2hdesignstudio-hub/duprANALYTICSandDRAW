<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUPR Night Analytics · PickleBee by 71</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<!-- docx library: builds real .docx files in the browser -->
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
<style>
:root{
  --bg:#e9efe9; --surface:#f4f8f3; --surface-2:#eef3ed;
  --lime:#a8d600; --lime-deep:#8bb800; --pink:#ff2e9a; --cyan:#12cccc;
  --ink:#1c2a1f; --muted:#6b7d6e;
  --clay:7px 7px 18px rgba(60,80,55,.18), -7px -7px 16px rgba(255,255,255,.9);
  --clay-in:inset 4px 4px 9px rgba(60,80,55,.16), inset -4px -4px 9px rgba(255,255,255,.85);
  --clay-sm:4px 4px 11px rgba(60,80,55,.16), -4px -4px 10px rgba(255,255,255,.85);
  --r:24px; --r-sm:13px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',sans-serif; color:var(--ink); padding:24px 16px 70px;
  background:
    radial-gradient(circle at 10% 6%, rgba(168,214,0,.10), transparent 40%),
    radial-gradient(circle at 92% 96%, rgba(18,204,204,.10), transparent 42%),
    var(--bg);
  min-height:100vh; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1240px;margin:0 auto;}
header{text-align:center;margin-bottom:30px;}
.logo{width:92px;height:92px;object-fit:contain;background:var(--surface);
  border-radius:50%;box-shadow:var(--clay);padding:12px;margin:0 auto 16px;display:block;}
.eyebrow{font-family:'Fredoka',sans-serif;font-weight:600;letter-spacing:.5px;
  color:var(--cyan);text-transform:uppercase;font-size:.8rem;margin-bottom:4px;}
h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(1.5rem,4vw,2.4rem);line-height:1.08;}
h1 .hl{color:var(--pink);}
.toolbar{display:flex;justify-content:center;gap:12px;margin:18px 0 4px;flex-wrap:wrap;}
.btn{font-family:'Fredoka',sans-serif;font-weight:600;font-size:.98rem;color:var(--ink);
  background:var(--surface);box-shadow:var(--clay-sm);border:none;border-radius:var(--r-sm);
  padding:11px 20px;cursor:pointer;transition:transform .15s ease;}
.btn:hover{transform:translateY(-2px);}
.btn.cyan{background:var(--cyan);color:#fff;}
.daysection{margin-top:34px;}
.dayhead{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.35rem;
  margin-bottom:4px;display:flex;align-items:center;gap:12px;}
.dayhead .date{font-size:.95rem;color:var(--muted);font-weight:700;font-family:'Nunito';}
.catcard{background:var(--surface);border-radius:var(--r);box-shadow:var(--clay);
  padding:20px 18px;margin-top:18px;}
.catcard .cattop{display:flex;justify-content:space-between;align-items:center;
  gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.catcard .cattitle{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.12rem;}
.catcard .cattitle .sub{font-family:'Nunito';font-weight:700;color:var(--muted);font-size:.85rem;}
.fillpill{font-weight:800;font-size:.8rem;padding:5px 12px;border-radius:14px;
  background:var(--surface-2);box-shadow:var(--clay-sm);color:var(--muted);}
.table-scroll{overflow-x:auto;border-radius:var(--r-sm);}
table{border-collapse:separate;border-spacing:0 7px;width:100%;min-width:560px;}
th{font-family:'Nunito';font-weight:800;font-size:.74rem;text-transform:uppercase;
  letter-spacing:.4px;color:var(--muted);text-align:left;padding:4px 9px;white-space:nowrap;}
td{background:var(--surface-2);padding:7px 9px;vertical-align:middle;}
td:first-child{border-radius:var(--r-sm) 0 0 var(--r-sm);font-family:'Fredoka';
  font-weight:600;text-align:center;width:46px;color:var(--lime-deep);}
td:last-child{border-radius:0 var(--r-sm) var(--r-sm) 0;}
td input{font-family:'Nunito';font-weight:700;font-size:.9rem;color:var(--ink);
  border:2px solid transparent;border-radius:9px;background:var(--surface);
  box-shadow:var(--clay-in);padding:8px 10px;width:100%;outline:none;transition:border-color .2s;}
td input.dupr{width:78px;text-align:center;}
td input.saved{border-color:var(--lime);}
td input.failed{border-color:var(--pink);}
td .avg{font-family:'Fredoka';font-weight:600;color:var(--ink);text-align:center;display:block;}
select.pay{font-family:'Nunito';font-weight:800;font-size:.82rem;border:none;cursor:pointer;
  border-radius:9px;padding:8px 8px;box-shadow:var(--clay-sm);outline:none;}
select.pay[data-v="Paid"]{background:var(--lime-deep);color:#fff;}
select.pay[data-v="Pending"]{background:#ffe1ef;color:var(--pink);}
a.sliplink{font-weight:800;font-size:.82rem;color:var(--cyan);text-decoration:none;
  padding:7px 12px;border-radius:9px;box-shadow:var(--clay-sm);background:var(--surface);
  display:inline-block;white-space:nowrap;}
a.sliplink.none{color:var(--muted);box-shadow:none;background:none;cursor:default;}
.del{border:none;cursor:pointer;background:#ffe1ef;color:var(--pink);font-weight:800;
  font-size:.8rem;border-radius:9px;padding:8px 11px;box-shadow:var(--clay-sm);white-space:nowrap;}
.del:hover{background:var(--pink);color:#fff;}
.xdel{border:none;cursor:pointer;background:var(--ink);color:#fff;font-weight:800;
  font-size:.8rem;border-radius:9px;padding:8px 10px;box-shadow:var(--clay-sm);
  white-space:nowrap;margin-left:6px;}
.xdel:hover{background:#000;}
.rowacts{display:flex;flex-wrap:nowrap;}
.emptyrow{color:var(--muted);font-weight:700;padding:14px;text-align:center;
  background:var(--surface-2);border-radius:var(--r-sm);}
.drawbtn{font-family:'Fredoka';font-weight:600;font-size:1rem;color:#fff;border:none;
  cursor:pointer;border-radius:var(--r-sm);padding:12px 22px;
  background:linear-gradient(135deg,var(--cyan),var(--lime-deep));box-shadow:var(--clay-sm);}
.drawbtn:hover{transform:translateY(-2px);}
.cardbtns{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap;}
.addbtn{font-family:'Fredoka';font-weight:600;font-size:1rem;color:var(--ink);border:none;
  cursor:pointer;border-radius:var(--r-sm);padding:12px 22px;
  background:var(--surface-2);box-shadow:var(--clay-sm);}
.addbtn:hover{transform:translateY(-2px);background:#e3edda;}
.loading{text-align:center;color:var(--muted);font-weight:700;padding:50px;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;font-weight:700;padding:12px 22px;border-radius:14px;
  box-shadow:var(--clay);opacity:0;pointer-events:none;transition:opacity .3s;z-index:80;}
.toast.show{opacity:1;}

/* ---- Draw preview modal ---- */
.modal{position:fixed;inset:0;background:rgba(28,42,31,.55);backdrop-filter:blur(5px);
  display:none;z-index:70;padding:22px;overflow:auto;}
.modal.show{display:block;}
.sheet{max-width:900px;margin:0 auto;background:var(--surface);border-radius:var(--r);
  box-shadow:var(--clay);padding:26px 24px 32px;}
.sheet h2{font-family:'Fredoka';font-weight:700;font-size:1.5rem;}
.sheet .meta{color:var(--muted);font-weight:700;margin:4px 0 18px;}
.sheet h3{font-family:'Fredoka';font-weight:600;font-size:1.12rem;margin:22px 0 10px;
  padding-bottom:6px;border-bottom:2px solid var(--surface-2);}
.dtable{width:100%;border-collapse:collapse;margin-bottom:6px;font-size:.9rem;}
.dtable th{background:var(--surface-2);color:var(--ink);text-align:left;padding:8px 10px;
  font-size:.72rem;border:1px solid #d7e1d4;}
.dtable td{padding:8px 10px;border:1px solid #d7e1d4;font-weight:600;}
.dtable td.c{text-align:center;}
.notebox{background:var(--surface-2);box-shadow:var(--clay-in);border-radius:var(--r-sm);
  padding:12px 14px;font-size:.85rem;font-weight:600;color:var(--muted);margin-top:8px;}
.otpbox{background:linear-gradient(135deg,var(--cyan),var(--lime-deep));color:#fff;
  border-radius:var(--r-sm);box-shadow:var(--clay-sm);padding:16px 18px;margin:6px 0 16px;
  font-weight:700;font-size:1.05rem;text-align:center;}
.otpbox b{font-family:'Fredoka';font-size:2rem;letter-spacing:.15em;display:inline-block;margin-top:2px;}
.otpbox span{display:block;font-weight:600;font-size:.8rem;opacity:.92;margin-top:6px;}
.modalbar{display:flex;gap:12px;justify-content:flex-end;margin-top:24px;flex-wrap:wrap;}
.modalbar .btn.green{background:linear-gradient(135deg,var(--lime),var(--lime-deep));color:#fff;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img src="./picklebee-logo.png" class="logo" alt="PickleBee by 71" onerror="this.style.display='none'">
    <div class="eyebrow">DUPR Night Analytics</div>
    <h1 id="welcome">Insights from PickleBee by 71</h1>
    <div class="toolbar">
      <button class="btn cyan" onclick="loadDashboard()">Reload data</button>
    </div>
  </header>
  <div id="content"><div class="loading">Loading registrations…</div></div>
</div>

<div class="modal" id="drawModal">
  <div class="sheet" id="drawSheet"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   PASTE THE SAME APPS SCRIPT /exec URL YOU USED FOR WEBSITE 1
   ============================================================ */
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzeZaUXvfqsA1oVqwwnSxdn_JJrYnCJQ5-3vA0-TCJSjMZUP2tRMEl-PawqlxZ5opGbXg/exec";

let DASH = null;
let LAST_DRAW = null;

const DAY_GROUPS = [
  { day:'tuesday',   title:'Tuesday Schedule',   cats:['newbee_doubles','mixed_doubles'] },
  { day:'wednesday', title:'Wednesday Schedule', cats:['stinger_doubles'] },
  { day:'thursday',  title:'Thursday Schedule',  cats:['newbee_singles','stinger_singles'] },
];

/* start time (in minutes from midnight) for each category's draw */

/* =================== load + render dashboard =================== */
async function loadDashboard(){
  document.getElementById('content').innerHTML = '<div class="loading">Loading registrations…</div>';
  try{
    const res = await fetch(BACKEND_URL + '?action=dashboard');
    DASH = await res.json();
    document.getElementById('welcome').innerHTML =
      `Insights from the <span class="hl">Week ${DASH.week}</span> of DUPR at PickleBee by 71`;
    render();
  }catch(e){
    document.getElementById('content').innerHTML =
      '<div class="loading">Couldn\'t load data. Check the backend URL and try Reload.</div>';
  }
}
function render(){
  const root = document.getElementById('content'); root.innerHTML='';
  DAY_GROUPS.forEach(group=>{
    const sec=document.createElement('div'); sec.className='daysection';
    sec.innerHTML=`<div class="dayhead">${group.title}<span class="date">${DASH.dates[group.day]}</span></div>`;
    group.cats.forEach(key=> sec.appendChild(buildCatCard(key)) );
    root.appendChild(sec);
  });
}
function buildCatCard(key){
  const c=DASH.categories[key];
  const addLabel = c.type==='singles' ? 'Add a BEE' : 'Add a Pair of BEEs';
  const card=document.createElement('div'); card.className='catcard';
  card.innerHTML=`
    <div class="cattop">
      <div class="cattitle">${c.label} <span class="sub">· ${c.time}</span></div>
      <div class="fillpill">${c.filled} / ${c.limit} filled</div>
    </div>
    <div class="table-scroll">${buildTable(key,c)}</div>
    <div class="cardbtns">
      <button class="addbtn" onclick="addSlot('${key}')">+ ${addLabel}</button>
      <button class="drawbtn" onclick="generateDraw('${key}')">Generate Draw</button>
    </div>`;
  return card;
}
function buildTable(key,c){
  if(c.rows.length===0) return '<div class="emptyrow">No registrations yet.</div>';
  let head, body='';
  if(c.type==='doubles'){
    head=`<tr><th>#</th><th>Player 1</th><th>Player 2</th><th>P1 DUPR</th><th>P2 DUPR</th>
      <th>Avg</th><th>Slip</th><th>Pay P1</th><th>Pay P2</th><th></th></tr>`;
    c.rows.forEach(r=>{ body+=`<tr><td>${r.num}</td>
      <td>${txt(key,r.index,'player1',r.player1,180)}</td>
      <td>${txt(key,r.index,'player2',r.player2,180)}</td>
      <td>${num(key,r.index,'p1dupr',r.p1dupr)}</td>
      <td>${num(key,r.index,'p2dupr',r.p2dupr)}</td>
      <td><span class="avg" id="avg-${key}-${r.index}">${r.avg||'—'}</span></td>
      <td>${slip(r.slip)}</td>
      <td>${pay(key,r.index,'payconf1',r.payconf1)}</td>
      <td>${pay(key,r.index,'payconf2',r.payconf2)}</td>
      <td><div class="rowacts">${del(key,r.index)}${xdel(key,r.index,!!r.player1)}</div></td></tr>`; });
  }else if(c.type==='mixed'){
    head=`<tr><th>#</th><th>Player 1</th><th>Player 2</th><th>Slip</th><th>Pay P1</th><th>Pay P2</th><th></th></tr>`;
    c.rows.forEach(r=>{ body+=`<tr><td>${r.num}</td>
      <td>${txt(key,r.index,'player1',r.player1,190)}</td>
      <td>${txt(key,r.index,'player2',r.player2,190)}</td>
      <td>${slip(r.slip)}</td>
      <td>${pay(key,r.index,'payconf1',r.payconf1)}</td>
      <td>${pay(key,r.index,'payconf2',r.payconf2)}</td>
      <td><div class="rowacts">${del(key,r.index)}${xdel(key,r.index,!!r.player1)}</div></td></tr>`; });
  }else{
    head=`<tr><th>#</th><th>Player 1</th><th>DUPR</th><th>Slip</th><th>Payment</th><th></th></tr>`;
    c.rows.forEach(r=>{ body+=`<tr><td>${r.num}</td>
      <td>${txt(key,r.index,'player1',r.player1,200)}</td>
      <td>${num(key,r.index,'dupr',r.dupr)}</td>
      <td>${slip(r.slip)}</td>
      <td>${pay(key,r.index,'payconf',r.payconf)}</td>
      <td><div class="rowacts">${del(key,r.index)}${xdel(key,r.index,!!r.player1)}</div></td></tr>`; });
  }
  return `<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
}
function esc(v){ return String(v==null?'':v).replace(/"/g,'&quot;'); }
function txt(key,i,field,val,w){ return `<input type="text" style="min-width:${w}px" value="${esc(val)}" onkeydown="enterNext(event,this)" onchange="saveCell(this,'${key}',${i},'${field}')">`; }
function num(key,i,field,val){ return `<input type="number" step="0.001" class="dupr" value="${esc(val)}" onkeydown="enterNext(event,this)" onchange="saveCell(this,'${key}',${i},'${field}')">`; }
function pay(key,i,field,val){ const v=(val==='Paid')?'Paid':'Pending';
  return `<select class="pay" data-v="${v}" onchange="this.setAttribute('data-v',this.value);saveCell(this,'${key}',${i},'${field}')">
    <option ${v==='Pending'?'selected':''}>Pending</option><option ${v==='Paid'?'selected':''}>Paid</option></select>`; }
function slip(url){ if(!url) return '<span class="sliplink none">none</span>';
  return `<a class="sliplink" href="${esc(url)}" target="_blank" rel="noopener">View slip</a>`; }
function del(key,i){ return `<button class="del" onclick="deleteRow('${key}',${i})">Delete</button>`; }
function xdel(key,i,hasData){ return `<button class="xdel" onclick="removeSlot('${key}',${i},${hasData})" title="Remove this slot entirely">X</button>`; }

/* Pressing Enter jumps to the next editable text/number cell (and saves the
   current one, since leaving the field fires its change handler). */
function enterNext(event, el){
  if(event.key !== 'Enter') return;
  event.preventDefault();
  const inputs = Array.from(document.querySelectorAll(
    '#content input[type=text], #content input[type=number]'));
  const i = inputs.indexOf(el);
  if(i > -1 && i < inputs.length - 1) inputs[i+1].focus();
  else el.blur();
}

/* =================== edits + deletes =================== */
async function saveCell(el,key,index,field){
  try{
    const res=await fetch(BACKEND_URL,{method:'POST',body:JSON.stringify({action:'update',week:DASH.week,category:key,index:index,field:field,value:el.value})});
    const out=await res.json();
    if(out.ok){
      if(el.tagName==='INPUT'){ el.classList.add('saved'); setTimeout(()=>el.classList.remove('saved'),1000); }
      if(out.avg!==null && out.avg!==undefined){ const a=document.getElementById(`avg-${key}-${index}`); if(a) a.textContent=out.avg||'—'; }
      toast('Saved');
    }else{ failCell(el); toast(out.error||'Save failed'); }
  }catch(e){ failCell(el); toast('Network error'); }
}
function failCell(el){ if(el.tagName==='INPUT'){ el.classList.add('failed'); setTimeout(()=>el.classList.remove('failed'),1500);} }
async function deleteRow(key,index){
  if(!confirm('Remove this entry? This frees the spot on the registration site.')) return;
  try{
    const res=await fetch(BACKEND_URL,{method:'POST',body:JSON.stringify({action:'delete',week:DASH.week,category:key,index:index})});
    const out=await res.json();
    if(out.ok){ toast('Entry removed'); loadDashboard(); } else toast(out.error||'Delete failed');
  }catch(e){ toast('Network error'); }
}
async function addSlot(key){
  try{
    const res=await fetch(BACKEND_URL,{method:'POST',body:JSON.stringify({action:'addSlot',week:DASH.week,category:key})});
    const out=await res.json();
    if(out.ok){ toast('Slot added'); loadDashboard(); } else toast(out.error||'Could not add slot');
  }catch(e){ toast('Network error'); }
}
async function removeSlot(key,index,hasData){
  const msg = hasData
    ? 'This slot still has a registration in it. Removing it will DELETE that entry AND remove the slot itself — capacity drops by one. This cannot be undone. Continue?'
    : 'Remove this empty slot? Category capacity will drop by one.';
  if(!confirm(msg)) return;
  try{
    const res=await fetch(BACKEND_URL,{method:'POST',body:JSON.stringify({action:'removeSlot',week:DASH.week,category:key,index:index})});
    const out=await res.json();
    if(out.ok){ toast('Slot removed'); loadDashboard(); } else toast(out.error||'Could not remove slot');
  }catch(e){ toast('Network error'); }
}

/* ================================================================
 *  DRAW + OTP  (built and persisted by the backend)
 * ================================================================ */
function cap(s){ return s? s.charAt(0).toUpperCase()+s.slice(1) : ''; }
function closeDraw(){ document.getElementById('drawModal').classList.remove('show'); }

async function generateDraw(key){
  toast('Generating draw…');
  try{
    const res=await fetch(BACKEND_URL,{method:'POST',body:JSON.stringify({action:'generateDraw',week:DASH.week,category:key})});
    const out=await res.json();
    if(!out.ok){ toast(out.error||'Could not generate draw'); return; }
    LAST_DRAW=out.draw; LAST_DRAW.otp=out.otp;
    renderPreview(out.draw, out.otp, key);
  }catch(e){ toast('Network error'); }
}

// Look up the day/date/time for a category from the dashboard data.
function dayInfo(key){
  for(const g of DAY_GROUPS){ if(g.cats.includes(key)){
    return { day:g.day, date:DASH.dates[g.day], time:(DASH.categories[key]||{}).time||'' };
  }}
  return { day:'', date:'', time:(DASH.categories[key]||{}).time||'' };
}

function drawNote(structure){
  if(structure==='3group') return 'Qualifier 7 = best 3rd-placed team across the groups; Qualifier 8 = second-best. Standings rank by matches won, then net points (scored − allowed), then head-to-head.';
  if(structure==='4group') return 'Four groups of four — the winner of each group advances straight to the semifinals.';
  if(structure==='mixed')  return 'Mixed is randomly seeded into two groups. Top two of each group reach the semifinals, with a 3rd-place play-off before the final.';
  return '';
}

function renderPreview(d, otp, key){
  const di=dayInfo(key);
  let html=`<h2>${d.label} — Draw</h2>
    <div class="meta">${cap(di.day)} ${di.date} · ${di.time} · Week ${d.week} · ${d.structure}</div>`;

  html+=`<div class="otpbox">Referee access code<b>${otp}</b>
    <span>Read this out to the referees. Valid for this category, today only.</span></div>`;

  html+=`<h3>Seeding</h3><table class="dtable"><tr><th>Seed</th><th>${d.type==='singles'?'Player':'Pair'}</th><th>${d.type==='mixed'?'Method':'Rating'}</th></tr>`;
  d.seeds.forEach(t=>{ html+=`<tr><td class="c">${t.rank}</td><td>${t.name}</td><td class="c">${d.type==='mixed'?'Random':(t.rating?Number(t.rating).toFixed(3):'—')}</td></tr>`; });
  html+=`</table>`;

  html+=`<h3>Groups</h3><table class="dtable"><tr>${d.groups.map(g=>`<th>${g.label}</th>`).join('')}</tr>`;
  const maxLen=Math.max.apply(null, d.groups.map(g=>g.members.length));
  for(let i=0;i<maxLen;i++){ html+='<tr>'+d.groups.map(g=>`<td>${g.members[i]||''}</td>`).join('')+'</tr>'; }
  html+=`</table>`;

  html+=`<h3>Group Stage — Round Robin</h3><table class="dtable"><tr><th>Time</th><th>Court</th><th>Group</th><th>Match</th></tr>`;
  d.groupStage.forEach(m=>{ html+=`<tr><td class="c">${m.time}</td><td class="c">${m.court}</td><td class="c">${m.group}</td><td>${m.a} &nbsp;vs&nbsp; ${m.b}</td></tr>`; });
  html+=`</table>`;

  html+=`<h3>Knockout Bracket</h3><table class="dtable"><tr><th>Stage</th><th>Court</th><th>Time</th><th>Match</th></tr>`;
  d.knockout.forEach(m=>{ html+=`<tr><td>${m.stage}</td><td class="c">${m.court}</td><td class="c">${m.time}</td><td>${m.a} &nbsp;vs&nbsp; ${m.b}</td></tr>`; });
  html+=`</table>`;

  const note=drawNote(d.structure);
  if(note) html+=`<div class="notebox">${note}</div>`;
  html+=`<div class="notebox">Once you generate this draw the referees can begin scoring with the code above. Re-generating is blocked once any score has been entered.</div>`;

  html+=`<div class="modalbar">
      <button class="btn" onclick="closeDraw()">Close</button>
      <button class="btn green" onclick="downloadDraw()">Download .docx</button>
    </div>`;
  document.getElementById('drawSheet').innerHTML=html;
  document.getElementById('drawModal').classList.add('show');
}

/* ---------- .docx download ---------- */
function downloadDraw(){
  const d=LAST_DRAW; if(!d) return;
  if(typeof docx==='undefined'){ toast('Draw library still loading — try again in a moment.'); return; }
  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, HeadingLevel } = docx;
  const cell=(t,bold,fill)=> new TableCell({ shading: fill?{fill:fill}:undefined,
    children:[new Paragraph({children:[new TextRun({text:String(t),bold:!!bold})]})] });
  const mkTable=(headers,rowsArr)=> new Table({ width:{size:100,type:WidthType.PERCENTAGE},
    rows:[ new TableRow({children:headers.map(h=>cell(h,true,'EEF3ED'))}),
           ...rowsArr.map(r=> new TableRow({children:r.map(x=>cell(x,false))})) ] });
  const H=(t,lvl)=> new Paragraph({text:t, heading:lvl, spacing:{before:240,after:120}});
  const P=(t)=> new Paragraph({children:[new TextRun({text:t})], spacing:{after:120}});

  const kids=[];
  kids.push(new Paragraph({children:[new TextRun({text:d.label+' — Draw', bold:true, size:32})]}));
  kids.push(P('Week '+d.week+'  ·  '+d.structure+'  ·  Referee code: '+(d.otp||'')));

  kids.push(H('Seeding', HeadingLevel.HEADING_2));
  kids.push(mkTable(['Seed', d.type==='singles'?'Player':'Pair', d.type==='mixed'?'Method':'Rating'],
    d.seeds.map(t=>[String(t.rank), t.name, d.type==='mixed'?'Random':(t.rating?Number(t.rating).toFixed(3):'—')])));

  kids.push(H('Groups', HeadingLevel.HEADING_2));
  const maxLen=Math.max.apply(null, d.groups.map(g=>g.members.length));
  const grows=[]; for(let i=0;i<maxLen;i++) grows.push(d.groups.map(g=> g.members[i]||''));
  kids.push(mkTable(d.groups.map(g=>g.label), grows));

  kids.push(H('Group Stage — Round Robin', HeadingLevel.HEADING_2));
  kids.push(mkTable(['Time','Court','Group','Match'],
    d.groupStage.map(m=>[m.time,m.court,m.group,m.a+'  vs  '+m.b])));

  kids.push(H('Knockout Bracket', HeadingLevel.HEADING_2));
  kids.push(mkTable(['Stage','Court','Time','Match'],
    d.knockout.map(m=>[m.stage,m.court,m.time,m.a+'  vs  '+m.b])));

  const note=drawNote(d.structure);
  if(note){ kids.push(H('Notes', HeadingLevel.HEADING_2)); kids.push(P(note)); }

  const doc=new Document({sections:[{children:kids}]});
  Packer.toBlob(doc).then(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url;
    a.download=(d.label.replace(/[^a-z0-9]+/gi,'_'))+'_Week'+d.week+'_Draw.docx';
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    toast('Draw downloaded');
  }).catch(()=> toast('Could not build the .docx — try again.'));
}

/* ---------- toast ---------- */
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1900); }

loadDashboard();
</script>
