<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUPR Night Analytics · PickleBee by 71</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
:root{
  --bg:#e9efe9;--surface:#f4f8f3;--surface-2:#eef3ed;
  --lime:#a8d600;--lime-deep:#8bb800;--pink:#ff2e9a;--cyan:#12cccc;--orange:#ff8f00;
  --ink:#1c2a1f;--muted:#6b7d6e;
  --clay:7px 7px 18px rgba(60,80,55,.18),-7px -7px 16px rgba(255,255,255,.9);
  --clay-in:inset 4px 4px 9px rgba(60,80,55,.16),inset -4px -4px 9px rgba(255,255,255,.85);
  --clay-sm:4px 4px 11px rgba(60,80,55,.16),-4px -4px 10px rgba(255,255,255,.85);
  --r:24px;--r-sm:13px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;color:var(--ink);padding:24px 16px 90px;min-height:100vh;
  background:radial-gradient(circle at 10% 6%,rgba(168,214,0,.10),transparent 40%),
  radial-gradient(circle at 92% 96%,rgba(18,204,204,.10),transparent 42%),var(--bg);
  -webkit-font-smoothing:antialiased;}
.wrap{max-width:1240px;margin:0 auto;}
header{text-align:center;margin-bottom:30px;}
.logo{width:92px;height:92px;object-fit:contain;background:var(--surface);border-radius:50%;
  box-shadow:var(--clay);padding:12px;margin:0 auto 16px;display:block;}
.eyebrow{font-family:'Fredoka',sans-serif;font-weight:600;letter-spacing:.5px;color:var(--cyan);
  text-transform:uppercase;font-size:.8rem;margin-bottom:4px;}
h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(1.5rem,4vw,2.4rem);line-height:1.08;}
h1 .hl{color:var(--pink);}
.toolbar{display:flex;justify-content:center;gap:12px;margin:18px 0 4px;flex-wrap:wrap;}
.btn{font-family:'Fredoka',sans-serif;font-weight:600;font-size:.98rem;color:var(--ink);
  background:var(--surface);box-shadow:var(--clay-sm);border:none;border-radius:var(--r-sm);
  padding:11px 20px;cursor:pointer;transition:transform .15s ease;}
.btn:hover{transform:translateY(-2px);}
.btn.cyan{background:var(--cyan);color:#fff;}
.daysection{margin-top:34px;}
.dayhead{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.35rem;margin-bottom:4px;
  display:flex;align-items:center;gap:12px;}
.dayhead .date{font-size:.95rem;color:var(--muted);font-weight:700;font-family:'Nunito';}
.catcard{background:var(--surface);border-radius:var(--r);box-shadow:var(--clay);
  padding:20px 18px;margin-top:18px;}
.catcard .cattop{display:flex;justify-content:space-between;align-items:center;
  gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.catcard .cattitle{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.12rem;}
.catcard .cattitle .sub{font-family:'Nunito';font-weight:700;color:var(--muted);font-size:.85rem;}
.fillpill{font-weight:800;font-size:.8rem;padding:5px 12px;border-radius:14px;
  background:var(--surface-2);box-shadow:var(--clay-sm);color:var(--muted);}
.table-scroll{overflow-x:auto;border-radius:var(--r-sm);}
table{border-collapse:separate;border-spacing:0 7px;width:100%;min-width:560px;}
th{font-family:'Nunito';font-weight:800;font-size:.74rem;text-transform:uppercase;
  letter-spacing:.4px;color:var(--muted);text-align:left;padding:4px 9px;white-space:nowrap;}
td{background:var(--surface-2);padding:7px 9px;vertical-align:middle;}
td:first-child{border-radius:var(--r-sm) 0 0 var(--r-sm);font-family:'Fredoka';
  font-weight:600;text-align:center;width:46px;color:var(--lime-deep);}
td:last-child{border-radius:0 var(--r-sm) var(--r-sm) 0;}
td input{font-family:'Nunito';font-weight:700;font-size:.9rem;color:var(--ink);
  border:2px solid transparent;border-radius:9px;background:var(--surface);
  box-shadow:var(--clay-in);padding:8px 10px;width:100%;outline:none;transition:border-color .2s;}
td input.dupr{width:78px;text-align:center;}
td input.saved{border-color:var(--lime);}
td input.failed{border-color:var(--pink);}
td .avg{font-family:'Fredoka';font-weight:600;color:var(--ink);text-align:center;display:block;}
select.pay{font-family:'Nunito';font-weight:800;font-size:.82rem;border:none;cursor:pointer;
  border-radius:9px;padding:8px 8px;box-shadow:var(--clay-sm);outline:none;}
select.pay[data-v="Paid"]{background:var(--lime-deep);color:#fff;}
select.pay[data-v="Pending"]{background:#ffe1ef;color:var(--pink);}
a.sliplink{font-weight:800;font-size:.82rem;color:var(--cyan);text-decoration:none;
  padding:7px 12px;border-radius:9px;box-shadow:var(--clay-sm);background:var(--surface);
  display:inline-block;white-space:nowrap;}
a.sliplink.none{color:var(--muted);box-shadow:none;background:none;cursor:default;}
.del{border:none;cursor:pointer;background:#ffe1ef;color:var(--pink);font-weight:800;
  font-size:.8rem;border-radius:9px;padding:8px 11px;box-shadow:var(--clay-sm);white-space:nowrap;}
.del:hover{background:var(--pink);color:#fff;}
.xdel{border:none;cursor:pointer;background:var(--ink);color:#fff;font-weight:800;
  font-size:.8rem;border-radius:9px;padding:8px 10px;box-shadow:var(--clay-sm);
  white-space:nowrap;margin-left:6px;}
.xdel:hover{background:#000;}
.rowacts{display:flex;flex-wrap:nowrap;}
.emptyrow{color:var(--muted);font-weight:700;padding:14px;text-align:center;
  background:var(--surface-2);border-radius:var(--r-sm);}
.cardbtns{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap;}
.addbtn{font-family:'Fredoka';font-weight:600;font-size:1rem;color:var(--ink);border:none;
  cursor:pointer;border-radius:var(--r-sm);padding:12px 22px;
  background:var(--surface-2);box-shadow:var(--clay-sm);}
.addbtn:hover{transform:translateY(-2px);background:#e3edda;}
.drawbtn{font-family:'Fredoka';font-weight:600;font-size:1rem;color:#fff;border:none;
  cursor:pointer;border-radius:var(--r-sm);padding:12px 22px;
  background:linear-gradient(135deg,var(--cyan),var(--lime-deep));box-shadow:var(--clay-sm);}
.drawbtn:hover{transform:translateY(-2px);}
.loading{text-align:center;color:var(--muted);font-weight:700;padding:50px;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;font-weight:700;padding:12px 22px;border-radius:14px;
  box-shadow:var(--clay);opacity:0;pointer-events:none;transition:opacity .3s;z-index:80;}
.toast.show{opacity:1;}

/* Draw config popup */
.modal{position:fixed;inset:0;background:rgba(28,42,31,.6);backdrop-filter:blur(5px);
  display:none;z-index:70;padding:22px 16px;overflow:auto;align-items:flex-start;justify-content:center;}
.modal.show{display:flex;}
.msheet{max-width:620px;width:100%;background:var(--surface);border-radius:var(--r);
  box-shadow:var(--clay);padding:28px 24px;margin:auto;}
.msheet h2{font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.4rem;margin-bottom:4px;}
.msheet .msub{color:var(--muted);font-weight:700;margin-bottom:20px;font-size:.9rem;}
.msheet h3{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1rem;margin:18px 0 10px;}
.cfgtotal{font-family:'Fredoka',sans-serif;font-size:1.1rem;font-weight:600;
  padding:12px 16px;border-radius:var(--r-sm);background:var(--surface-2);
  box-shadow:var(--clay-in);margin-bottom:18px;color:var(--ink);}
.cfgtotal b{color:var(--cyan);}
.segg{display:flex;gap:8px;flex-wrap:wrap;}
.segg button{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1rem;
  padding:11px 18px;border:none;border-radius:var(--r-sm);cursor:pointer;
  background:var(--surface-2);box-shadow:var(--clay-sm);color:var(--muted);transition:all .15s;}
.segg button.sel{background:var(--ink);color:#fff;box-shadow:var(--clay-in);}
.segg button.fin{background:var(--surface-2);}
.segg button.fin.sel{background:var(--cyan);color:#fff;}
.seed-hint{display:block;font-size:.68rem;font-weight:600;opacity:.75;margin-top:2px;}
.segg button:disabled{opacity:.4;cursor:not-allowed;}
.grp-inputs{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:12px;}
.grp-inp-wrap label{display:block;font-weight:800;font-size:.82rem;margin-bottom:6px;color:var(--muted);}
.grp-inp-wrap input{width:100%;font-family:'Nunito';font-weight:700;font-size:1.1rem;text-align:center;
  color:var(--ink);padding:12px 8px;border:2px solid transparent;border-radius:var(--r-sm);
  background:var(--surface-2);box-shadow:var(--clay-in);outline:none;transition:border-color .2s;}
.grp-inp-wrap input.ok{border-color:var(--lime);}
.grp-inp-wrap input.err{border-color:var(--pink);}
.sum-pill{display:inline-block;margin-top:14px;padding:8px 16px;border-radius:14px;
  font-weight:800;font-size:.88rem;}
.sum-pill.ok{background:#d6f0c2;color:#3a6b00;}
.sum-pill.err{background:#ffe1ef;color:var(--pink);}
.mbtns{display:flex;gap:12px;margin-top:24px;justify-content:flex-end;flex-wrap:wrap;}
.mbtns .btn.green{background:linear-gradient(135deg,var(--lime),var(--lime-deep));color:#fff;}
.mbtns .btn.green:disabled{background:var(--surface-2);color:#a8b8aa;cursor:not-allowed;transform:none;}

/* ── Groups + Swap popup ── */
.groups-hdr{display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;margin:18px 0 10px;}
.groups-hdr h3{margin:0;}
.swap-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.swap-btn{font-family:'Fredoka',sans-serif;font-weight:600;font-size:.92rem;
  padding:9px 16px;border:none;border-radius:var(--r-sm);cursor:pointer;
  background:var(--cyan);color:#fff;box-shadow:var(--clay-sm);transition:all .15s;
  display:flex;align-items:center;gap:7px;}
.swap-btn:disabled{background:var(--surface-2);color:#a8b8aa;cursor:not-allowed;box-shadow:none;}
.swap-btn:not(:disabled):hover{transform:translateY(-1px);}
.swap-icon{font-size:1.1rem;line-height:1;}
.swap-hint{font-size:.82rem;font-weight:700;color:var(--pink);}
.groups-grid{display:grid;gap:14px;margin-bottom:8px;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));}
.group-col{background:var(--surface-2);border-radius:var(--r-sm);padding:12px;}
.group-col-label{font-family:'Fredoka',sans-serif;font-weight:700;font-size:.95rem;
  margin-bottom:10px;color:var(--ink);}
.group-member{background:var(--surface);border-radius:11px;padding:10px 12px;
  margin-bottom:8px;cursor:pointer;font-size:.88rem;font-weight:700;color:var(--ink);
  box-shadow:var(--clay-sm);border:2px solid transparent;transition:all .15s;}
.group-member:last-child{margin-bottom:0;}
.group-member:hover{transform:translateY(-1px);}
.group-member.selected{border-color:var(--cyan);background:#e3f7f7;}
.group-member .gm-rating{display:block;font-size:.72rem;font-weight:800;color:var(--muted);margin-bottom:2px;}
.group-member.selected .gm-rating{color:var(--cyan);}

/* Draw preview sheet */
.psheet{max-width:900px;background:var(--surface);border-radius:var(--r);
  box-shadow:var(--clay);padding:26px 24px 32px;margin:auto;}
.psheet .otp-banner{background:linear-gradient(135deg,var(--cyan),var(--lime-deep));
  color:#fff;border-radius:var(--r-sm);padding:16px 18px;margin:4px 0 20px;text-align:center;}
.psheet .otp-banner b{font-family:'Fredoka',sans-serif;font-size:2.4rem;letter-spacing:.2em;display:block;margin-top:2px;}
.psheet .otp-banner span{font-size:.82rem;font-weight:600;opacity:.92;display:block;margin-top:4px;}
.psheet h2{font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.5rem;}
.psheet .meta{color:var(--muted);font-weight:700;margin:4px 0 18px;}
.psheet h3{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.12rem;margin:22px 0 10px;
  padding-bottom:6px;border-bottom:2px solid var(--surface-2);}
.dtable{width:100%;border-collapse:collapse;margin-bottom:6px;font-size:.9rem;}
.dtable th{background:var(--surface-2);color:var(--ink);text-align:left;padding:8px 10px;
  font-size:.72rem;border:1px solid #d7e1d4;font-weight:800;}
.dtable td{padding:8px 10px;border:1px solid #d7e1d4;font-weight:600;}
.dtable td.c{text-align:center;}
/* Reset the general td:first-child lime styling so all dtable columns look identical */
.dtable td:first-child{border-radius:0;font-family:'Nunito',sans-serif;font-weight:600;
  text-align:left;width:auto;color:var(--ink);}
.notebox{background:var(--surface-2);box-shadow:var(--clay-in);border-radius:var(--r-sm);
  padding:12px 14px;font-size:.85rem;font-weight:600;color:var(--muted);margin-top:8px;}

/* Floating nav bar */
.floatnav{position:fixed;bottom:0;left:0;right:0;z-index:90;
  background:var(--surface);box-shadow:0 -4px 20px rgba(60,80,55,.15);
  display:flex;align-items:stretch;height:62px;border-top:2px solid var(--surface-2);}
.floatnav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Fredoka',sans-serif;font-weight:600;font-size:.9rem;color:var(--muted);
  text-decoration:none;gap:3px;transition:color .15s;}
.floatnav a.active,.floatnav a:hover{color:var(--cyan);}
.floatnav a .dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);
  display:none;margin-top:2px;}
.floatnav a.active .dot{display:block;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img src="./picklebee-logo.png" class="logo" alt="PickleBee by 71" onerror="this.style.display='none'">
    <div class="eyebrow">DUPR Night Analytics — Season 2</div>
    <h1 id="welcome">Insights from PickleBee by 71</h1>
    <div class="toolbar">
      <button class="btn cyan" onclick="loadDashboard()">Reload data</button>
    </div>
  </header>
  <div id="content"><div class="loading">Loading registrations…</div></div>
</div>

<!-- Draw config popup -->
<div class="modal" id="cfgModal">
  <div class="msheet" id="cfgSheet"></div>
</div>

<!-- Groups + Swap popup — shows seeding + groups only, lets the admin
     manually swap teams between groups before building the full schedule -->
<div class="modal" id="groupsModal">
  <div class="psheet" id="groupsSheet"></div>
</div>

<!-- Draw preview modal -->
<div class="modal" id="drawModal">
  <div class="psheet" id="drawSheet"></div>
</div>

<!-- Floating nav bar -->
<nav class="floatnav">
  <a href="https://pb71.org/">Registrations</a>
  <a href="https://z2hdesignstudio-hub.github.io/scoringDUPR/" target="_blank">Score</a>
  <a href="https://z2hdesignstudio-hub.github.io/DUPRleaderboard/" target="_blank">Leaderboard</a>
</nav>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   PASTE YOUR APPS SCRIPT /exec URL HERE
   ============================================================ */
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzeZaUXvfqsA1oVqwwnSxdn_JJrYnCJQ5-3vA0-TCJSjMZUP2tRMEl-PawqlxZ5opGbXg/exec";

const WEEK14_START = new Date(2026, 5, 13); // Sat 13 Jun 2026

// Day sections in display order — filtered by active week
const DAY_GROUPS_FULL = [
  { day:'monday',    title:'Monday Schedule',    cats:['action_doubles'],              sinceWeek:17 },
  { day:'tuesday',   title:'Tuesday Schedule',   cats:['mixed_doubles'] },
  { day:'wednesday', title:'Wednesday Schedule', cats:['newbee_doubles','stinger_doubles'] },
  { day:'thursday',  title:'Thursday Schedule',  cats:['newbee_singles','stinger_singles'] },
];

function getDayGroups(week){
  return DAY_GROUPS_FULL.filter(g=>!g.sinceWeek||week>=g.sinceWeek);
}

let DASH = null;
let LAST_DRAW = null;
let CURRENT_DRAW_KEY = null;

// PERF: debounce storage for cell saves
const _debounce = {};

/* ======================== dashboard ======================== */
async function loadDashboard(){
  document.getElementById('content').innerHTML='<div class="loading">Loading registrations…</div>';
  try{
    const res=await fetch(BACKEND_URL+'?action=dashboard');
    DASH=await res.json();
    document.getElementById('welcome').innerHTML=
      `Insights from the <span class="hl">Week ${DASH.week}</span> of DUPR at PickleBee by 71`;
    render();
  }catch(e){
    document.getElementById('content').innerHTML='<div class="loading">Could not load data. Check URL and try Reload.</div>';
  }
}

function render(){
  const root=document.getElementById('content'); root.innerHTML='';
  getDayGroups(DASH.week).forEach(group=>{
    const sec=document.createElement('div'); sec.className='daysection';
    const date=DASH.dates&&DASH.dates[group.day]?DASH.dates[group.day]:'';
    sec.innerHTML=`<div class="dayhead">${group.title}<span class="date">${date}</span></div>`;
    group.cats.forEach(key=>{
      if(!DASH.categories[key]) return;
      const card=buildCatCard(key);
      card.id='catcard-'+key;
      sec.appendChild(card);
    });
    root.appendChild(sec);
  });
}

// PERF: update only one category card in-place (no full re-render)
async function refreshCard(key){
  try{
    const res=await fetch(BACKEND_URL+'?action=dashboard');
    DASH=await res.json();
    const existing=document.getElementById('catcard-'+key);
    if(!existing){render();return;}
    const newCard=buildCatCard(key);
    newCard.id='catcard-'+key;
    existing.replaceWith(newCard);
  }catch(e){ toast('Could not refresh'); }
}

function buildCatCard(key){
  const c=DASH.categories[key];
  const addLabel=c.type==='singles'?'Add a BEE':'Add a Pair of BEEs';
  const card=document.createElement('div'); card.className='catcard';
  card.innerHTML=`
    <div class="cattop">
      <div class="cattitle">${c.label} <span class="sub">· ${c.time}</span></div>
      <div class="fillpill">${c.filled} / ${c.limit} filled</div>
    </div>
    <div class="table-scroll">${buildTable(key,c)}</div>
    <div class="cardbtns">
      <button class="addbtn" onclick="addSlot('${key}')">+ ${addLabel}</button>
      <button class="drawbtn" onclick="openDrawConfig('${key}')">Preview Draw</button>
    </div>`;
  return card;
}

function buildTable(key,c){
  if(c.rows.length===0) return '<div class="emptyrow">No registrations yet.</div>';
  const hasData=r=>String(r.player1||'').trim()!=='';
  let head,body='';
  if(c.type==='doubles'){
    head=`<tr><th>#</th><th>Player 1</th><th>Player 2</th><th>P1 DUPR</th><th>P2 DUPR</th>
      <th>Avg</th><th>Slip</th><th>Pay P1</th><th>Pay P2</th><th></th></tr>`;
    c.rows.forEach(r=>{ body+=`<tr><td>${r.num}</td>
      <td>${txt(key,r.index,'player1',r.player1,180)}</td>
      <td>${txt(key,r.index,'player2',r.player2,180)}</td>
      <td>${num(key,r.index,'p1dupr',r.p1dupr)}</td>
      <td>${num(key,r.index,'p2dupr',r.p2dupr)}</td>
      <td><span class="avg" id="avg-${key}-${r.index}">${r.avg||'—'}</span></td>
      <td>${slip(r.slip)}</td>
      <td>${pay(key,r.index,'payconf1',r.payconf1)}</td>
      <td>${pay(key,r.index,'payconf2',r.payconf2)}</td>
      <td><div class="rowacts">${del(key,r.index)}${xdel(key,r.index,hasData(r))}</div></td></tr>`;});
  }else if(c.type==='mixed'){
    head=`<tr><th>#</th><th>Player 1</th><th>Player 2</th><th>Slip</th><th>Pay P1</th><th>Pay P2</th><th></th></tr>`;
    c.rows.forEach(r=>{ body+=`<tr><td>${r.num}</td>
      <td>${txt(key,r.index,'player1',r.player1,190)}</td>
      <td>${txt(key,r.index,'player2',r.player2,190)}</td>
      <td>${slip(r.slip)}</td>
      <td>${pay(key,r.index,'payconf1',r.payconf1)}</td>
      <td>${pay(key,r.index,'payconf2',r.payconf2)}</td>
      <td><div class="rowacts">${del(key,r.index)}${xdel(key,r.index,hasData(r))}</div></td></tr>`;});
  }else{
    head=`<tr><th>#</th><th>Player 1</th><th>DUPR</th><th>Slip</th><th>Payment</th><th></th></tr>`;
    c.rows.forEach(r=>{ body+=`<tr><td>${r.num}</td>
      <td>${txt(key,r.index,'player1',r.player1,200)}</td>
      <td>${num(key,r.index,'dupr',r.dupr)}</td>
      <td>${slip(r.slip)}</td>
      <td>${pay(key,r.index,'payconf',r.payconf)}</td>
      <td><div class="rowacts">${del(key,r.index)}${xdel(key,r.index,hasData(r))}</div></td></tr>`;});
  }
  return `<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
}

function esc(v){ return String(v==null?'':v).replace(/"/g,'&quot;'); }
function txt(key,i,field,val,w){ return `<input type="text" style="min-width:${w}px" value="${esc(val)}" onkeydown="enterNext(event,this)" onchange="saveCell(this,'${key}',${i},'${field}')">`; }
function num(key,i,field,val){ return `<input type="number" step="0.001" class="dupr" value="${esc(val)}" onkeydown="enterNext(event,this)" onchange="saveCell(this,'${key}',${i},'${field}')">`; }
function pay(key,i,field,val){ const v=(val==='Paid')?'Paid':'Pending';
  return `<select class="pay" data-v="${v}" onchange="this.setAttribute('data-v',this.value);saveCell(this,'${key}',${i},'${field}')">
    <option ${v==='Pending'?'selected':''}>Pending</option><option ${v==='Paid'?'selected':''}>Paid</option></select>`; }
function slip(url){ if(!url) return '<span class="sliplink none">none</span>';
  return `<a class="sliplink" href="${esc(url)}" target="_blank" rel="noopener">View slip</a>`; }
function del(key,i){ return `<button class="del" onclick="deleteRow('${key}',${i})">Delete</button>`; }
function xdel(key,i,hasData){ return `<button class="xdel" onclick="removeSlot('${key}',${i},${hasData})" title="Remove this slot">X</button>`; }

/* ---- Enter-to-next-field ---- */
function enterNext(event,el){
  if(event.key!=='Enter')return; event.preventDefault();
  const inputs=Array.from(document.querySelectorAll('#content input[type=text],#content input[type=number]'));
  const i=inputs.indexOf(el);
  if(i>-1&&i<inputs.length-1)inputs[i+1].focus();else el.blur();
}

/* ======================== edits ======================== */
// PERF: 400ms debounce on cell saves — prevents duplicate writes from fast typists
function saveCell(el,key,index,field){
  const k=`${key}_${index}_${field}`;
  clearTimeout(_debounce[k]);
  _debounce[k]=setTimeout(()=>_doSaveCell(el,key,index,field),400);
}
async function _doSaveCell(el,key,index,field){
  try{
    const res=await fetch(BACKEND_URL,{method:'POST',body:JSON.stringify({action:'update',week:DASH.week,category:key,index:index,field:field,value:el.value})});
    const out=await res.json();
    if(out.ok){
      if(el.tagName==='INPUT'){el.classList.add('saved');setTimeout(()=>el.classList.remove('saved'),1000);}
      if(out.avg!=null){const a=document.getElementById(`avg-${key}-${index}`);if(a)a.textContent=out.avg||'—';}
      toast('Saved');
    }else{failCell(el);toast(out.error||'Save failed');}
  }catch(e){failCell(el);toast('Network error');}
}
function failCell(el){if(el.tagName==='INPUT'){el.classList.add('failed');setTimeout(()=>el.classList.remove('failed'),1500);}}

async function deleteRow(key,index){
  if(!confirm('Remove this entry? This frees the spot on the registration site.'))return;
  try{
    const res=await fetch(BACKEND_URL,{method:'POST',body:JSON.stringify({action:'delete',week:DASH.week,category:key,index:index})});
    const out=await res.json();
    if(out.ok){toast('Entry removed');refreshCard(key);}else toast(out.error||'Delete failed');
  }catch(e){toast('Network error');}
}
async function addSlot(key){
  try{
    const res=await fetch(BACKEND_URL,{method:'POST',body:JSON.stringify({action:'addSlot',week:DASH.week,category:key})});
    const out=await res.json();
    if(out.ok){toast('Slot added');refreshCard(key);}else toast(out.error||'Could not add slot');
  }catch(e){toast('Network error');}
}
async function removeSlot(key,index,hasData){
  const msg=hasData?'This slot has a registration. Removing it will DELETE that entry AND remove the slot — capacity drops by one. Continue?':'Remove this empty slot? Capacity will drop by one.';
  if(!confirm(msg))return;

/* ======================== DRAW CONFIG POPUP ======================== */
let _cfgKey=null, _cfgGroups=2, _cfgFinals=1, _cfgSeedMethod='snake', _cfgHasQF=false;

function openDrawConfig(key){
  _cfgKey=key; _cfgGroups=2; _cfgFinals=1; _cfgSeedMethod='snake'; _cfgHasQF=false;
  renderCfgPopup();
  document.getElementById('cfgModal').classList.add('show');
}
function closeCfg(){ document.getElementById('cfgModal').classList.remove('show'); }

function renderCfgPopup(){
  const c=DASH.categories[_cfgKey];
  const total=c.rows.filter(r=>String(r.player1||'').trim()!=='').length;
  const ng=_cfgGroups;

  // Build group size inputs
  let grpHtml='<div class="grp-inputs">';
  const letters='ABCD'.split('');
  for(let g=0;g<ng;g++){
    grpHtml+=`<div class="grp-inp-wrap">
      <label>Group ${letters[g]} — players</label>
      <input type="number" min="1" id="grp${g}" value="" placeholder="0" oninput="updateSum(${total})">
    </div>`;
  }
  grpHtml+='</div>';
  grpHtml+=`<div class="sum-pill err" id="sumPill">Total: 0 / ${total}</div>`;

  // Finals selector (only for 4 groups)
  const finalsHtml=ng===4?`
    <h3>Number of Finals</h3>
    <div class="segg" id="finalsToggle">
      <button class="fin ${_cfgFinals===1?'sel':''}" onclick="setCfgFinals(1)">1 Final</button>
      <button class="fin ${_cfgFinals===2?'sel':''}" onclick="setCfgFinals(2)">2 Finals</button>

  const qfHtml=ng===4?`
    <div id="qfToggleWrap" style="display:${_cfgFinals===1?'block':'none'}">
      <h3>Include Quarterfinals?</h3>
      <div class="segg" id="qfToggle">
        <button class="fin ${!_cfgHasQF?'sel':''}" onclick="setCfgHasQF(false)">No</button>
        <button class="fin ${_cfgHasQF?'sel':''}" onclick="setCfgHasQF(true)">Yes</button>
      </div>
    </div>`:'';

  // Seeding method toggle — irrelevant for Mixed Bee (already random), so hidden there.
  const seedHtml=c.type==='mixed'?'':`
    <h3>Group Seeding</h3>
    <div class="segg" id="seedToggle">
      <button class="fin ${_cfgSeedMethod==='snake'?'sel':''}" onclick="setCfgSeedMethod('snake')">Snake <span class="seed-hint">balanced groups</span></button>
      <button class="fin ${_cfgSeedMethod==='cyclic'?'sel':''}" onclick="setCfgSeedMethod('cyclic')">Cyclic <span class="seed-hint">Group of Death</span></button>
    </div>`;

  document.getElementById('cfgSheet').innerHTML=`
    <h2>Draw Configuration</h2>
    <div class="msub">${c.label} · Week ${DASH.week}</div>
    <div class="cfgtotal">Total registered players: <b>${total}</b></div>
    <h3>Number of Groups</h3>

    ${grpHtml}
    ${finalsHtml}

      <button class="btn" onclick="closeCfg()">Cancel</button>
      <button class="btn green" id="cfgConfirm" disabled onclick="previewGroups()">Preview Groups</button>
    </div>`;
}

function setCfgGroups(n,total){ _cfgGroups=n; if(n!==4){_cfgFinals=1;_cfgHasQF=false;} renderCfgPopup(); updateSum(total); }
function setCfgFinals(n){ _cfgFinals=n;
  document.querySelectorAll('#finalsToggle .fin').forEach(b=>b.classList.remove('sel'));
  event.target.classList.add('sel');
  // QF option only makes sense with exactly 1 Final — hide/reset it otherwise.
  const qfWrap=document.getElementById('qfToggleWrap');
  if(qfWrap) qfWrap.style.display=(n===1)?'block':'none';
  if(n!==1) _cfgHasQF=false;
}
function setCfgHasQF(v){ _cfgHasQF=v;
  document.querySelectorAll('#qfToggle .fin').forEach(b=>b.classList.remove('sel'));
  event.target.classList.add('sel');
}
function setCfgSeedMethod(m){ _cfgSeedMethod=m;
  document.querySelectorAll('#seedToggle .fin').forEach(b=>b.classList.remove('sel'));
  event.target.closest('.fin').classList.add('sel');
}

function updateSum(total){
  let sum=0; const ng=_cfgGroups; const letters='ABCD'.split('');
  let allFilled=true;
  for(let g=0;g<ng;g++){
    const inp=document.getElementById('grp'+g);
    if(!inp)continue;
    const v=parseInt(inp.value)||0;
    sum+=v;
    if(!inp.value.trim())allFilled=false;
    inp.className=v>0?'ok':'';
  }
  const pill=document.getElementById('sumPill');
  const ok=sum===total&&allFilled;
  if(pill){pill.className='sum-pill '+(ok?'ok':'err');pill.textContent='Total: '+sum+' / '+total;}
  const btn=document.getElementById('cfgConfirm');
  if(btn)btn.disabled=!ok;
}

function getGroupSizes(){
  const ng=_cfgGroups; const sizes=[];
  for(let g=0;g<ng;g++){
    const inp=document.getElementById('grp'+g);
    sizes.push(parseInt(inp&&inp.value)||0);
  }
  return sizes;
}

async function previewGroups(){
  const btn=document.getElementById('cfgConfirm');
  btn.disabled=true; btn.textContent='Loading groups…';
  const groupSizes=getGroupSizes();
  try{
    const res=await fetch(BACKEND_URL,{method:'POST',body:JSON.stringify({
      action:'previewGroups',week:DASH.week,category:_cfgKey,
      groupSizes:groupSizes,numFinals:_cfgFinals,seedMethod:_cfgSeedMethod,hasQF:_cfgHasQF,
    })});
    const out=await res.json();
    if(!out.ok){
      toast(out.error||'Could not preview groups');
      btn.disabled=false; btn.textContent='Preview Groups';
      return;
    }
    closeCfg();
    btn.disabled=false; btn.textContent='Preview Groups';
    GROUPS_DRAFT=out.groups; CURRENT_DRAW_KEY=_cfgKey;
    _selectedTeams=[];
    renderGroupsPopup();
    document.getElementById('groupsModal').classList.add('show');

  }catch(e){ toast('Network error'); btn.disabled=false; btn.textContent='Preview Groups'; }
}

let GROUPS_DRAFT=null;
let _selectedTeams=[]; // up to 2 team IDs currently selected for swapping

function closeGroupsPopup(){ document.getElementById('groupsModal').classList.remove('show'); }

function renderGroupsPopup(){
  const d=GROUPS_DRAFT; if(!d) return;

  let html=`<h2>${d.label} — Groups Preview</h2>
    <div class="meta">Week ${d.week} · ${d.numGroups} group(s) · ${d.numFinals} final(s)${d.hasQF?' · with Quarterfinals':''}${d.type!=='mixed'?' · '+d.seedMethod.charAt(0).toUpperCase()+d.seedMethod.slice(1)+' seeding':''}</div>
    <div class="notebox" style="border-left:4px solid var(--cyan);">
      Click two players/pairs below, then press Swap to exchange their groups.
      Nothing is final yet — press <b>Generate Draw</b> when you're happy with the groups.
    </div>`;

  // Seeding table for reference
  html+=`<h3>Seeding</h3><table class="dtable"><tr><th>Seed</th><th>${d.type==='singles'?'Player':'Pair'}</th><th>${d.type==='mixed'?'Method':'Rating'}</th></tr>`;
  d.seeds.forEach(t=>{html+=`<tr><td class="c">${t.rank}</td><td>${t.name}</td><td class="c">${d.type==='mixed'?'Random':(t.rating?Number(t.rating).toFixed(3):'—')}</td></tr>`;});
  html+=`</table>`;

  // Groups header with swap controls
  const numGroups=d.groups.length;
  html+=`<div class="groups-hdr">
    <h3>Groups</h3>
    ${numGroups>1?`<div class="swap-controls">
      <button class="swap-btn" id="swapBtn" disabled onclick="doSwap()"><span class="swap-icon">&#8644;</span> Swap</button>
      <span class="swap-hint" id="swapHint" style="display:none;"></span>
    </div>`:''}
  </div>`;

  // Interactive groups grid
  html+=`<div class="groups-grid">`;
  d.groups.forEach(g=>{
    html+=`<div class="group-col"><div class="group-col-label">${g.label}</div>`;
    g.members.forEach(m=>{
      const sel=_selectedTeams.includes(m.id);
      const ratingLabel=d.type==='mixed'?'Random':(m.rating?Number(m.rating).toFixed(3):'—');
      html+=`<div class="group-member ${sel?'selected':''}" onclick="toggleTeamSelect('${m.id}')">
        <span class="gm-rating">${ratingLabel}</span>${m.name}
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`</div>`;

  html+=`<div class="mbtns">
    <button class="btn" onclick="closeGroupsPopup()">Close</button>
    <button class="btn green" onclick="finalizeGenerateDraw()">Generate Draw</button>
  </div>`;

  document.getElementById('groupsSheet').innerHTML=html;
  updateSwapButtonState();
}

function toggleTeamSelect(teamId){
  const idx=_selectedTeams.indexOf(teamId);
  if(idx>-1){
    _selectedTeams.splice(idx,1); // re-clicking a selected name deselects it
  }else{
    if(_selectedTeams.length>=2) _selectedTeams.shift(); // keep only the 2 most recent selections
    _selectedTeams.push(teamId);
  }
  renderGroupsPopup();
}

function updateSwapButtonState(){
  const btn=document.getElementById('swapBtn');
  const hint=document.getElementById('swapHint');
  if(!btn) return; // single-group category — no swap controls rendered
  if(_selectedTeams.length!==2){
    btn.disabled=true;
    if(hint) hint.style.display='none';
    return;
  }
  const groupOf=teamId=>GROUPS_DRAFT.groups.findIndex(g=>g.members.some(m=>m.id===teamId));
  const gA=groupOf(_selectedTeams[0]), gB=groupOf(_selectedTeams[1]);
  if(gA===gB){
    btn.disabled=true;
    if(hint){ hint.textContent='They are already in the same group.'; hint.style.display='inline'; }
  }else{
    btn.disabled=false;
    if(hint) hint.style.display='none';
  }
}

async function doSwap(){
  if(_selectedTeams.length!==2) return;
  const btn=document.getElementById('swapBtn');
  btn.disabled=true; btn.innerHTML='<span class="swap-icon">&#8644;</span> Swapping…';
  try{
    const res=await fetch(BACKEND_URL,{method:'POST',body:JSON.stringify({
      action:'swapGroups',week:DASH.week,category:CURRENT_DRAW_KEY,
      teamIdA:_selectedTeams[0],teamIdB:_selectedTeams[1],
    })});
    const out=await res.json();
    if(!out.ok){ toast(out.error||'Could not swap'); }
    else{ GROUPS_DRAFT=out.groups; toast('Swapped'); }
  }catch(e){ toast('Network error'); }
  _selectedTeams=[];
  renderGroupsPopup();
}

async function finalizeGenerateDraw(){
  const btns=document.querySelectorAll('#groupsSheet .mbtns button');
  btns.forEach(b=>b.disabled=true);
  try{
    const res=await fetch(BACKEND_URL,{method:'POST',body:JSON.stringify({
      action:'previewDraw',week:DASH.week,category:CURRENT_DRAW_KEY,

/* ======================== STYLED DOWNLOAD — .docx or .xlsx ======================== */
async function downloadDraw(format){
  const d=LAST_DRAW; if(!d) return;
  const docxBtn=document.getElementById('downloadDocxBtn');
  const xlsxBtn=document.getElementById('downloadXlsxBtn');
  const activeBtn=format==='xlsx'?xlsxBtn:docxBtn;
  const otherBtn=format==='xlsx'?docxBtn:xlsxBtn;

  // Commit the exact previewed draft to live BEFORE building the file.
  // This is the one moment referees' view actually changes — guaranteeing
  // the downloaded file and what Website 3 shows are always identical.
  // (Safe to commit again even if already committed this session — it's
  // an idempotent overwrite with the same draft data.)
  if(activeBtn){ activeBtn.disabled=true; activeBtn.textContent='Committing draw…'; }
  if(otherBtn) otherBtn.disabled=true;
  let drawSheetUrl=null;
  try{
    const res=await fetch(BACKEND_URL,{method:'POST',body:JSON.stringify({
      action:'commitDraw',week:DASH.week,category:CURRENT_DRAW_KEY,
    })});
    const out=await res.json();
    if(!out.ok){
      toast(out.error||'Could not commit this draw');
      resetDownloadBtns();
      return; // do NOT download — nothing changed for referees either
    }
    drawSheetUrl=out.drawSheetUrl;
  }catch(e){
    toast('Network error — draw was not committed');
    resetDownloadBtns();
    return;
  }
  if(activeBtn){ activeBtn.textContent='Preparing document…'; }

  if(format==='xlsx') await buildAndDownloadXlsx(d);
  else await buildAndDownloadDocx(d);

  resetDownloadBtns();
  if(drawSheetUrl){
    toast('Downloaded — this week\'s Draws sheet was also updated');
  }
}
function resetDownloadBtns(){
  const docxBtn=document.getElementById('downloadDocxBtn');
  const xlsxBtn=document.getElementById('downloadXlsxBtn');
  if(docxBtn){ docxBtn.disabled=false; docxBtn.textContent='Download .docx'; }
  if(xlsxBtn){ xlsxBtn.disabled=false; xlsxBtn.textContent='Download .xlsx'; }
}

function buildAndDownloadDocx(d){
  if(typeof docx==='undefined'){toast('Draw library loading — try again in a moment.');return;}
  const {Document,Packer,Paragraph,TextRun,Table,TableRow,TableCell,WidthType,HeadingLevel,AlignmentType,ShadingType,BorderStyle} = docx;

  const DARK='1A2744', WHITE='FFFFFF', LIME='8BB800', PINK='FF2E9A', CYAN='12CCCC', ORANGE='FF8F00';
  const categoryColor = (type,accent) => ({lime:LIME,pink:PINK,cyan:CYAN,orange:ORANGE}[accent]||LIME);
  const catColor = categoryColor(d.type, DASH.categories[CURRENT_DRAW_KEY]&&DASH.categories[CURRENT_DRAW_KEY].accent||'lime');

  // Helper builders
  const shading=(color)=>({type:ShadingType.CLEAR,color:'auto',fill:color});
  const borders=(color)=>({top:{style:BorderStyle.SINGLE,size:6,color:color},bottom:{style:BorderStyle.SINGLE,size:6,color:color},left:{style:BorderStyle.SINGLE,size:6,color:color},right:{style:BorderStyle.SINGLE,size:6,color:color}});
  const cell=(text,opts={})=>new TableCell({
    shading:opts.bg?shading(opts.bg):undefined,
    borders:opts.border?borders(opts.border||'CCCCCC'):undefined,
    width:opts.w?{size:opts.w,type:WidthType.PERCENTAGE}:undefined,
    children:[new Paragraph({alignment:opts.center?AlignmentType.CENTER:AlignmentType.LEFT,
      children:[new TextRun({text:String(text||''),bold:!!opts.bold,color:opts.color||'000000',size:opts.size||20})]})]
  });
  const row=(...cells)=>new TableRow({children:cells});
  const P=(text,opts={})=>new Paragraph({alignment:opts.center?AlignmentType.CENTER:AlignmentType.LEFT,
    spacing:{before:opts.before||0,after:opts.after||100},
    children:[new TextRun({text:String(text||''),bold:!!opts.bold,size:opts.size||20,color:opts.color||'000000',font:opts.font||'Calibri'})]});
  const spacer=()=>new Paragraph({text:'',spacing:{after:80}});

  const kids=[];

  // === COVER PAGE ===
  // Dark header bar simulation
  kids.push(new Table({width:{size:100,type:WidthType.PERCENTAGE},rows:[row(
    cell('PickleBee by 71\nDUPR Night Draw System\nDesigned & Developed by Z2H x Real Solutions',{bg:DARK,color:WHITE,bold:true,size:22,w:75}),
    cell('Z2H x REALSOLUTIONS',{bg:CYAN,color:DARK,bold:true,center:true,size:20,w:25})
  )]}));
  kids.push(spacer());
  kids.push(P(`DUPR Night ${d.label} — Draw`,{bold:true,size:36,center:true}));
  kids.push(P(new Date().toLocaleString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}),{center:true,size:20,color:'666666'}));
  kids.push(spacer());

  // Mode + Total pills
  kids.push(new Table({width:{size:60,type:WidthType.PERCENTAGE},rows:[row(
    cell('Mode: '+(d.type.charAt(0).toUpperCase()+d.type.slice(1)),{bg:'F0F0F0',size:20}),
    cell('Total: '+d.seeds.length+' Players',{bg:'F0F0F0',size:20}),
    cell('Structure: '+d.structure,{bg:'F0F0F0',size:20}),
    cell(d.seedMethod?('Seeding: '+d.seedMethod.charAt(0).toUpperCase()+d.seedMethod.slice(1)):'',{bg:'F0F0F0',size:20}),
  )]}));
  kids.push(spacer());

  // OTP banner
  kids.push(new Table({width:{size:100,type:WidthType.PERCENTAGE},rows:[row(
    cell('REFEREE ACCESS CODE — OTP: '+d.otp+'\nShare with referees. Valid for the entire week.',{bg:catColor,color:WHITE,bold:true,size:24,center:true})
  )]}));
  kids.push(spacer());

  // Summary per group
  kids.push(P('Groups Summary',{bold:true,size:24}));
  d.groups.forEach(g=>{
    const matchCount=d.groupStage.filter(m=>m.group===g.label).length;
    // Derive court from actual match data (not hardcoded by letter)
    const gCourt=(d.groupStage.find(m=>m.group===g.label)||{}).court||'Court N';
    kids.push(new Table({width:{size:100,type:WidthType.PERCENTAGE},rows:[
      row(cell(g.label+' - '+g.members.length+' participants - '+matchCount+' round-robin matches - '+gCourt,{bg:catColor,color:WHITE,bold:true,size:20}))
    ]}));
    kids.push(spacer());
  });

  // === PER GROUP PAGES ===
  d.groups.forEach((g,gi)=>{
    kids.push(new Paragraph({pageBreakBefore:gi>0,text:'',spacing:{after:80}}));

    // Category header (em dash replaced with regular dash)
    kids.push(new Table({width:{size:100,type:WidthType.PERCENTAGE},rows:[
      row(cell(d.label+' - '+g.label,{bg:DARK,color:WHITE,bold:true,size:26}))
    ]}));
    kids.push(spacer());

    // Court derived from actual match data (Fix 3: no more hardcoded A/B=N, C=B)
    const courtLabel=(d.groupStage.find(m=>m.group===g.label)||{}).court||'Court N';
    kids.push(new Table({width:{size:100,type:WidthType.PERCENTAGE},rows:[
      row(cell(courtLabel+' · '+g.members.length+' players',{bg:catColor,color:WHITE,bold:true,size:22}))
    ]}));
    kids.push(P('PARTICIPANTS',{bold:true,color:catColor,size:18,before:120}));

    g.members.forEach((name,mi)=>{
      const seed=d.seeds.find(s=>s.name===name);
      const rating=seed&&seed.rating?Number(seed.rating).toFixed(3):'';
      kids.push(new Table({width:{size:100,type:WidthType.PERCENTAGE},rows:[row(
        cell((mi+1)+'.  '+name,{size:20}),
        cell(rating?'DUPR '+rating:'',{size:20,color:catColor,bold:true,center:true,w:20})
      )]}));
    });

    // Round robin schedule (Fix 4: time column added before match ID)
    const groupMatches=d.groupStage.filter(m=>m.group===g.label);
    kids.push(spacer());
    kids.push(P('ROUND ROBIN SCHEDULE - '+groupMatches.length+' MATCHES',{bold:true,color:catColor,size:18}));
    groupMatches.forEach((m,mi)=>{
      kids.push(new Table({width:{size:100,type:WidthType.PERCENTAGE},rows:[row(
        cell(m.time,{size:16,center:true,color:'444444',w:14}),
        cell(m.id,{bg:catColor,color:WHITE,bold:true,size:16,center:true,w:9}),
        cell(m.a,{size:18,w:34}),
        cell('vs',{size:16,color:catColor,center:true,w:9}),
        cell(m.b,{size:18,w:34})
      )]}));
    });

    // Blank standings table
    kids.push(spacer());
    kids.push(P('STANDINGS (FILL IN DURING PLAY)',{bold:true,color:catColor,size:18}));
    kids.push(new Table({width:{size:100,type:WidthType.PERCENTAGE},rows:[
      row(
        cell('Player / Pair',{bg:DARK,color:WHITE,bold:true,size:18,w:55}),
        cell('W',{bg:DARK,color:WHITE,bold:true,center:true,size:18,w:12}),
        cell('L',{bg:DARK,color:WHITE,bold:true,center:true,size:18,w:11}),
        cell('Pts',{bg:DARK,color:WHITE,bold:true,center:true,size:18,w:11}),
        cell('Rank',{bg:DARK,color:WHITE,bold:true,center:true,size:18,w:11}),
      ),
      ...g.members.map(name=>row(
        cell(name,{size:18}),
        cell('___',{center:true,color:'AAAAAA',size:16}),
        cell('___',{center:true,color:'AAAAAA',size:16}),
        cell('___',{center:true,color:'AAAAAA',size:16}),
        cell('___',{center:true,color:'AAAAAA',size:16}),
      ))
    ]}));
  });

  // === KNOCKOUT PAGE === (Fix 5: time column added to every match row)
  kids.push(new Paragraph({pageBreakBefore:true,text:'',spacing:{after:80}}));
  kids.push(new Table({width:{size:100,type:WidthType.PERCENTAGE},rows:[
    row(cell('KNOCKOUT STAGE',{bg:DARK,color:WHITE,bold:true,size:28,center:true}))
  ]}));
  kids.push(spacer());

  const stages=[...new Set(d.knockout.map(m=>m.stage))];
  stages.forEach(stage=>{
    const stageMoves=d.knockout.filter(m=>m.stage===stage);
    const stageLabel=stage==='final'?'FINAL - BEE OF THE COURT':
      stage==='final1'?'FINAL 1':stage==='final2'?'FINAL 2':
      stage.toUpperCase().replace('QF','QUARTERFINAL ').replace('SF','SEMI FINAL ').replace('CON','CONSOLATION');
    kids.push(P(stageLabel,{bold:true,size:22,before:160}));
    stageMoves.forEach(m=>{
      kids.push(new Table({width:{size:100,type:WidthType.PERCENTAGE},rows:[row(
        cell(m.time||'',{size:16,center:true,color:'444444',w:14}),
        cell(m.a,{size:18,w:36}),
        cell('vs',{size:16,color:catColor,center:true,w:14}),
        cell(m.b,{size:18,w:36}),
      )]}));
    });
    kids.push(spacer());
  });

  // Footer note
  kids.push(P('PickleBee by 71 · DUPR Night Draw System · Designed & Developed by Z2H x RealSolutions',{center:true,size:16,color:'999999'}));

  const doc=new Document({sections:[{children:kids}]});
  return Packer.toBlob(doc).then(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url;
    a.download=(d.label.replace(/[^a-z0-9]+/gi,'_'))+'_Week'+d.week+'_Draw.docx';
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    toast('Draw downloaded');
  }).catch(()=>toast('Could not build the .docx — try again.'));
}

/* ======================== STYLED .xlsx DOWNLOAD ======================== */
// Colors match the separate live Draws Google Sheet for visual consistency
// between the two Part-B outputs.
const XLSX_CYAN='00FFFF', XLSX_GREEN='00B050', XLSX_YELLOW='FFFF00', XLSX_RED='FF0000';

// Same "(QF1)", "(Semi 1)", "(Final)" convention as the live Draws sheet.
function xlsxStageLabel(m){
  if(m.stage==='group') return '';
  const map={qf:'QF',sf:'Semi',final:'Final',final1:'Final 1',final2:'Final 2',consolation:'Consolation'};
  const base=map[m.stage]||m.stage;
  if(m.stage==='qf'||m.stage==='sf'){
    const num=(m.id.match(/\d+$/)||[''])[0];
    return '('+base+' '+num+') ';
  }
  return '('+base+') ';
}

const XLSX_PROMO_NOTES={
  '1group':'Top 4 from the round robin proceed to the semis and final!',
  '2group':'Rank 1 and Rank 2 from each group will proceed to semis and finals!',
  '3group':'Table Rank 1, Rank 2, Qualifier 7 & Qualifier 8 will proceed to semis and finals.',
  '4group-1final':'Rank 1 from each group will proceed to semis and finals!',
  '4group-1final-qf':'Rank 1 and Rank 2 from each group will proceed to the Quarterfinals!',
  '4group-2finals':'Rank 1 from each group will proceed straight to the Finals!',
};

async function buildAndDownloadXlsx(d){
  if(typeof XLSX==='undefined'){ toast('Spreadsheet library loading — try again in a moment.'); return; }
  const isSingles=(d.type==='singles');
  const headerColor=isSingles?XLSX_CYAN:XLSX_GREEN;

  const fill=(hex)=>({fgColor:{rgb:hex}});
  const cellS=(v,style)=>({v:v==null?'':v, t:(typeof v==='number'?'n':'s'), s:style||{}});
  const boldCenter=(hex)=>({font:{bold:true},fill:hex?fill(hex):undefined,alignment:{horizontal:'center',vertical:'center'}});
  const plain=()=>({alignment:{vertical:'center'}});
  const merges=[];
  const mergeRow=(r,c1,c2)=>merges.push({s:{r,c:c1},e:{r,c:c2}});

  const wb=XLSX.utils.book_new();

  // ── Sheet 1: Groups (standings, blank score/rank for fill-in) ──
  {
    const rows=[]; const localMerges=[];
    d.groups.forEach(g=>{
      const groupMatchesForTime=d.groupStage.find(m=>m.group===g.label);
      const timeLabel=groupMatchesForTime?groupMatchesForTime.time:'';
      const r0=rows.length;
      rows.push([cellS(g.label+' - '+timeLabel,boldCenter(XLSX_YELLOW)),cellS('',boldCenter(XLSX_YELLOW)),cellS('',boldCenter(XLSX_YELLOW))]);
      localMerges.push({s:{r:r0,c:0},e:{r:r0,c:2}});
      rows.push([
        cellS(isSingles?'Singles players':'Doubles Team',boldCenter(headerColor)),
        cellS('Total Score Points',boldCenter(headerColor)),
        cellS('Rank',boldCenter(headerColor)),
      ]);
      g.members.forEach(name=>rows.push([cellS(name,plain()),cellS('',plain()),cellS('',plain())]));
      rows.push([cellS('',plain()),cellS('',plain()),cellS('',plain())]); // blank separator
    });
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!merges']=localMerges;
    ws['!cols']=[{wch:28},{wch:20},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws,'Groups');
  }

  // ── One sheet per court in use: schedule table, continuous into knockout ──
  const courtsUsed=[...new Set(d.groupStage.map(m=>m.court).concat(d.knockout.map(m=>m.court)))];
  courtsUsed.forEach(court=>{
    const rows=[]; const localMerges=[];
    const r0=rows.length;
    rows.push([cellS(court,boldCenter(headerColor)),cellS('',boldCenter(headerColor)),cellS('',boldCenter(headerColor)),cellS('',boldCenter(headerColor)),cellS('',boldCenter(headerColor)),cellS('',boldCenter(headerColor))]);
    localMerges.push({s:{r:r0,c:0},e:{r:r0,c:5}});
    rows.push(['Game No','Time','Player 1','Score','Player 2','Score'].map(h=>cellS(h,boldCenter())));

    let gameNo=1, lastGroup=null;
    d.groupStage.filter(m=>m.court===court).forEach(m=>{
      if(m.group!==lastGroup){
        const rg=rows.length;
        rows.push([cellS(m.group+' - '+m.time,boldCenter(XLSX_YELLOW)),cellS('',boldCenter(XLSX_YELLOW)),cellS('',boldCenter(XLSX_YELLOW)),cellS('',boldCenter(XLSX_YELLOW)),cellS('',boldCenter(XLSX_YELLOW)),cellS('',boldCenter(XLSX_YELLOW))]);
        localMerges.push({s:{r:rg,c:0},e:{r:rg,c:5}});
        lastGroup=m.group;
      }
      rows.push([cellS(gameNo,plain()),cellS(m.time,plain()),cellS(m.a,plain()),cellS('',plain()),cellS(m.b,plain()),cellS('',plain())]);
      gameNo++;
    });
    d.knockout.filter(m=>m.court===court).forEach(m=>{
      const label=xlsxStageLabel(m);
      rows.push([cellS(gameNo,plain()),cellS(m.time,plain()),cellS(label+m.a,plain()),cellS('',plain()),cellS(label+m.b,plain()),cellS('',plain())]);
      gameNo++;
    });

    rows.push([cellS('',plain()),cellS('',plain()),cellS('',plain()),cellS('',plain()),cellS('',plain()),cellS('',plain())]);
    const rNote=rows.length;
    const noteText=XLSX_PROMO_NOTES[d.structure]||'Winners advance to the next round!';
    rows.push([cellS(noteText,{font:{bold:true,color:{rgb:XLSX_RED}}}),cellS('',{}),cellS('',{}),cellS('',{}),cellS('',{}),cellS('',{})]);
    localMerges.push({s:{r:rNote,c:0},e:{r:rNote,c:5}});

    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!merges']=localMerges;
    ws['!cols']=[{wch:10},{wch:12},{wch:28},{wch:10},{wch:28},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws,court);
  });

  try{
    XLSX.writeFile(wb,(d.label.replace(/[^a-z0-9]+/gi,'_'))+'_Week'+d.week+'_Draw.xlsx');
    toast('Draw downloaded');
  }catch(e){ toast('Could not build the .xlsx — try again.'); }
}

/* ======================== toast ======================== */
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1900); }

loadDashboard();
</script>
